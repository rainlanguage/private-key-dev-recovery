name: Recover encrypted secret
on:
  workflow_dispatch:
    inputs:
      age_recipient:
        description: "Your age PUBLIC key (age1...) — only this key can decrypt the output"
        required: true
jobs:
  recover:
    runs-on: ubuntu-latest
    if: github.actor == 'thedavidmeister'      # gate 1: only the admin can run the job
    environment: secret-recovery                # gate 2: job pauses for admin approval
    steps:
      - name: Install age
        run: |
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz | tar -xz
          sudo mv age/age /usr/local/bin/age
      - name: Encrypt secret to your key
        env:
          SECRET: ${{ secrets.PRIVATE_KEY_DEV }}
          RECIPIENT: ${{ inputs.age_recipient }}
        run: |
          if [ -z "$SECRET" ]; then echo "::error::PRIVATE_KEY_DEV empty — scope the org secret to this repo"; exit 1; fi
          printf '%s' "$SECRET" | age -a -r "$RECIPIENT" > secret.age
          head -1 secret.age
      - name: Upload ciphertext
        uses: actions/upload-artifact@v4
        with:
          name: secret-age
          path: secret.age
          retention-days: 1